name: viberadar
description: "VibeRadar - DJ trend intelligence platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0
  collection: ^1.19.1
  firebase_core: ^4.6.0
